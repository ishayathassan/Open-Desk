<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome  -->
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
      rel="stylesheet"
    />

    <!-- Custom CSS  -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/base.css') }}"
    />
    {% block custom_css %} {% endblock %}

    <!-- Title Block  -->
    <title>{% block title %} {% endblock %}</title>

    <!-- Title Icon  -->
    <link
      rel="icon"
      href="{{ url_for('static', filename='images/Icon.png') }}"
      type="image/png"
      style="width: 16px; height: 16px"
    />
  </head>
  <body>
    <nav>
      <div id="nav-left">
        <div id="brand-logo">
          <a href="{{ url_for('home') }}"
            ><img
              src="{{ url_for('static', filename='images/Icon.png') }}"
              alt=""
          /></a>
        </div>
        <div class="search-container">
          <i class="fa fa-search"></i>
          <input type="text" class="search-input" placeholder="Search..." />
        </div>
      </div>
      <div id="nav-right">
        <!-- <ul>
          <li class="nav-links">
            <img
              src=" {{ url_for('static', filename='images/edit.png') }} "
              alt="Create"
            />

            <span>Create</span>
          </li>
          <li class="nav-links">
            <img
              src="{{ url_for('static', filename='images/messenger.png') }}"
              alt="Messages"
            />
          </li>
          <li class="nav-links">
            <img
              src="{{ url_for('static', filename='images/bell.png') }}"
              alt="Notifications"
            />
          </li>
          <li class="nav-links">
            <img
              src="{{ url_for('static', filename='images/user.png') }}"
              alt="Profile"
            />
          </li>
        </ul> -->
        <ul>
          <li id="sign-in" class="nav-btns">
            <a href="{{ url_for('login') }}">Sign In</a>
          </li>
          <li class="nav-btns">
            <a href="{{ url_for('signup') }}">Sign Up</a>
          </li>
        </ul>
      </div>
    </nav>

    {% block content %} {% endblock %}
  </body>
</html>
